name: Build Setup EXE (Windows)

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-setup:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Read app metadata
        shell: pwsh
        run: |
          $json = python -c "import json; from core.version import APP_NAME,__version__; print(json.dumps({'name':APP_NAME,'version':__version__}, ensure_ascii=False))"
          $meta = $json | ConvertFrom-Json
          "APP_NAME=$($meta.name)" >> $env:GITHUB_ENV
          "APP_VERSION=$($meta.version)" >> $env:GITHUB_ENV
          "APP_EXE=$($meta.name).exe" >> $env:GITHUB_ENV

      - name: Validate tag matches version
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          if ($tagVersion -ne "${env:APP_VERSION}") {
            Write-Error "Tag version ($tagVersion) does not match core/version.py (${env:APP_VERSION})."
            exit 1
          }

      - name: Build app (PyInstaller onedir)
        shell: pwsh
        run: |
          @'
          from pathlib import Path
          import PyInstaller.__main__
          from core.version import APP_NAME, APP_ICON, __version__

          def parse_version_tuple(version: str):
              parts = []
              for piece in str(version).split("."):
                  try:
                      parts.append(int(piece))
                  except ValueError:
                      parts.append(0)
              while len(parts) < 4:
                  parts.append(0)
              return tuple(parts[:4])

          root = Path.cwd()
          dist_dir = root / "dist"
          work_dir = root / "build"
          spec_dir = root
          work_dir.mkdir(parents=True, exist_ok=True)

          major, minor, patch, build = parse_version_tuple(__version__)
          version_tuple = f"({major}, {minor}, {patch}, {build})"
          version_text = f"{major}.{minor}.{patch}.{build}"
          version_file = work_dir / "version_info.autogen.txt"
          version_file.write_text(
              f"""# UTF-8
VSVersionInfo(
  ffi=FixedFileInfo(
    filevers={version_tuple},
    prodvers={version_tuple},
    mask=0x3f,
    flags=0x0,
    OS=0x40004,
    fileType=0x1,
    subtype=0x0,
    date=(0, 0)
    ),
  kids=[
    StringFileInfo(
      [
      StringTable(
        u'080404b0',
        [
        StringStruct(u'CompanyName', u'重庆彭于晏'),
        StringStruct(u'FileDescription', u'{APP_NAME}'),
        StringStruct(u'FileVersion', u'{version_text}'),
        StringStruct(u'InternalName', u'cxharvest'),
        StringStruct(u'LegalCopyright', u'Copyright (c) 2026 wjn6'),
        StringStruct(u'OriginalFilename', u'{APP_NAME}.exe'),
        StringStruct(u'ProductName', u'{APP_NAME}'),
        StringStruct(u'ProductVersion', u'{version_text}')])
      ]),
    VarFileInfo([VarStruct(u'Translation', [2052, 1200])])
  ]
)
""",
              encoding="utf-8",
          )

          args = [
              str(root / "main.py"),
              f"--name={APP_NAME}",
              "--onedir",
              "--noconsole",
              "--clean",
              "--noconfirm",
              "--contents-directory=libs",
              f"--version-file={version_file}",
              f"--distpath={dist_dir}",
              f"--workpath={work_dir}",
              f"--specpath={spec_dir}",
              f"--add-data={root / 'README.md'};.",
              f"--add-data={root / 'assets'};assets",
              "--collect-all=qfluentwidgets",
          ]

          icon_path = root / APP_ICON
          if icon_path.exists():
              args.append(f"--icon={icon_path}")

          PyInstaller.__main__.run(args)
          '@ | python -

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build Setup.exe
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          & $iscc /DMyAppName="$env:APP_NAME" /DMyAppVersion="$env:APP_VERSION" /DMyAppExeName="$env:APP_EXE" installer\setup.iss

      - name: Collect setup artifact metadata
        shell: pwsh
        run: |
          $setup = Get-ChildItem installer\*.exe | Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $setup) {
            Write-Error "Setup.exe was not generated."
            exit 1
          }
          $hash = Get-FileHash $setup.FullName -Algorithm SHA256
          $shaFile = "$($setup.FullName).sha256"
          "$($hash.Hash.ToLower())  $($setup.Name)" | Out-File -FilePath $shaFile -Encoding ascii

          "SETUP_EXE=$($setup.FullName)" >> $env:GITHUB_ENV
          "SETUP_SHA256=$shaFile" >> $env:GITHUB_ENV

      - name: Upload setup artifact
        uses: actions/upload-artifact@v4
        with:
          name: setup-exe-${{ env.APP_VERSION }}
          path: |
            ${{ env.SETUP_EXE }}
            ${{ env.SETUP_SHA256 }}
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.SETUP_EXE }}
            ${{ env.SETUP_SHA256 }}
          generate_release_notes: true
